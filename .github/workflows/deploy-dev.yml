name: Deploy to Dev

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [master]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  server-ci:
    uses: ./.github/workflows/server-ci.yml

  client-ci:
    uses: ./.github/workflows/client-ci.yml

  engine-ci:
    uses: ./.github/workflows/engine-ci.yml

  build-and-deploy:
    needs: [server-ci, client-ci, engine-ci]
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image (dev)
        run: |
          docker build -t ghcr.io/adrianfrackowiak/gochessplusplus-server:dev ./server
          docker push ghcr.io/adrianfrackowiak/gochessplusplus-server:dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build client (dev)
        working-directory: client
        env:
          VITE_API_BASE_URL: /api
        run: |
          npm ci
          npm run build

      - name: Deploy server (dev)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/chess-project
            git pull
            docker compose --env-file .env.dev -f docker-compose.dev.yml pull
            docker compose --env-file .env.dev -f docker-compose.dev.yml up -d

      - name: Deploy client (dev)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "client/dist/*"
          target: "/var/www/gochessplusplus/dev"
          strip_components: 2

      - name: Health check (dev)
        run: |
          sleep 3
          curl -f https://dev.gochessplusplus.dev/api/v1/health